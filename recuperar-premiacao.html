<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recuperar Premiações — Suprema</title>
<style>
  :root{
    --bg:#0e1512; --panel:#141d19; --panel2:#1b2621; --line:#26332c;
    --ink:#e8f0ea; --muted:#8fa398; --green:#18a36b; --green-d:#0f7a4f;
    --gold:#c9a24b; --red:#e05a5a; --radius:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;padding:24px}
  .wrap{max-width:900px;margin:0 auto}
  h1{font-size:22px;margin:0 0 4px}
  .sub{color:var(--muted);margin:0 0 20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:16px}
  label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  input,button{font:inherit}
  input[type=email],input[type=password],input[type=date]{
    width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;
    color:var(--ink);padding:10px 12px;margin-bottom:12px}
  button{cursor:pointer;border:none;border-radius:10px;padding:11px 18px;font-weight:600}
  .btn-primary{background:var(--green);color:#fff}
  .btn-primary:hover{background:var(--green-d)}
  .btn-primary:disabled{background:#2a3a32;color:var(--muted);cursor:not-allowed}
  .btn-ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
  .row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
  .row > div{flex:1;min-width:180px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:8px 0}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px}
  .stat .v{font-size:20px;font-weight:700}
  .stat .l{font-size:12px;color:var(--muted)}
  table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.03em}
  td.num{text-align:right;font-variant-numeric:tabular-nums;color:var(--gold)}
  .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px}
  .tag.ok{background:rgba(24,163,107,.18);color:#5fd6a4}
  .tag.warn{background:rgba(224,90,90,.15);color:#f0908f}
  .muted{color:var(--muted)}
  .log{white-space:pre-wrap;font:12px/1.5 ui-monospace,Menlo,Consolas,monospace;background:#0a100d;border:1px solid var(--line);border-radius:10px;padding:12px;max-height:220px;overflow:auto;margin-top:10px}
  .hide{display:none}
  .banner{border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:14px}
  .banner.err{background:rgba(224,90,90,.12);border:1px solid rgba(224,90,90,.4)}
  .banner.ok{background:rgba(24,163,107,.12);border:1px solid rgba(24,163,107,.4)}
  .tblwrap{overflow-x:auto}
</style>
</head>
<body>
<div class="wrap">
  <h1>♻️ Recuperar premiações</h1>
  <p class="sub">Reata as premiações órfãs (que sumiram quando uma grade nova trocou as chaves) usando o snapshot do dia, casando por <b>nome + hora</b>. Mostra tudo antes de gravar.</p>

  <!-- LOGIN -->
  <div class="card" id="loginCard">
    <label>E-mail</label>
    <input type="email" id="email" autocomplete="username" placeholder="seu@email.com">
    <label>Senha</label>
    <input type="password" id="password" autocomplete="current-password">
    <button class="btn-primary" id="loginBtn">Entrar</button>
    <span id="loginMsg" class="muted" style="margin-left:10px"></span>
  </div>

  <!-- APP -->
  <div id="app" class="hide">
    <div class="card">
      <div class="row">
        <div>
          <label>Dia operacional (nó <code>painel/&lt;data&gt;</code>)</label>
          <input type="date" id="dateInput">
        </div>
        <div style="flex:0">
          <button class="btn-ghost" id="loadBtn">Carregar</button>
        </div>
      </div>
      <div id="summary"></div>
    </div>

    <div class="card hide" id="previewCard">
      <div id="previewHead"></div>
      <div class="tblwrap"><table id="previewTable"></table></div>
      <div style="margin-top:14px">
        <button class="btn-primary" id="recoverBtn" disabled>Recuperar</button>
        <span id="recoverMsg" class="muted" style="margin-left:10px"></span>
      </div>
    </div>

    <div class="card">
      <label>Log</label>
      <div class="log" id="log"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<script>
const CONFIG = {
  apiKey: "AIzaSyAFy1GtRaJE3LHC1Rjtmq0uw2JC8bviXes",
  authDomain: "design-1-53c00.firebaseapp.com",
  databaseURL: "https://design-1-53c00-default-rtdb.firebaseio.com",
  projectId: "design-1-53c00",
  storageBucket: "design-1-53c00.firebasestorage.app",
  messagingSenderId: "140511032441",
  appId: "1:140511032441:web:dcf970125bbf5eec53d0a8"
};
firebase.initializeApp(CONFIG);
const auth = firebase.auth();
const db = firebase.database();

const $ = id => document.getElementById(id);
function log(msg){ const el=$('log'); el.textContent += msg+'\n'; el.scrollTop=el.scrollHeight; }
const fmtBRL = v => (v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});

// rowKey — CÓPIA EXATA de painel.js (não alterar: precisa gerar a mesma chave)
function rowKey(row){
  const s = `${row.nome}|${row.hora}|${row.buyin}|${row.garantido}`;
  let h = 0;
  for (let i=0;i<s.length;i++){ h = ((h<<5)-h) + s.charCodeAt(i); h |= 0; }
  return 'rk_' + Math.abs(h) + (row.proxCronograma ? '_px' : '');
}
const norm = (n,h)=>`${String(n||'').trim().toUpperCase()}|${h||''}`;

// data operacional padrão (turno vai até 05:30; antes disso ainda é "ontem")
function defaultDate(){
  const parts = new Intl.DateTimeFormat('sv-SE',{timeZone:'America/Sao_Paulo',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).formatToParts(new Date());
  const g = t => parts.find(p=>p.type===t).value;
  let y=+g('year'), mo=+g('month'), d=+g('day'); const hh=+g('hour'), mm=+g('minute');
  const dt = new Date(Date.UTC(y,mo-1,d));
  if(hh<5 || (hh===5 && mm<30)) dt.setUTCDate(dt.getUTCDate()-1);
  return dt.toISOString().slice(0,10);
}

// ── AUTH ──
auth.onAuthStateChanged(u => {
  if(u){
    $('loginCard').classList.add('hide');
    $('app').classList.remove('hide');
    log('Logado como '+(u.email||u.uid));
    $('dateInput').value = defaultDate();
    loadDate();
  } else {
    $('loginCard').classList.remove('hide');
    $('app').classList.add('hide');
  }
});
$('loginBtn').onclick = () => {
  $('loginMsg').textContent = 'entrando…';
  auth.signInWithEmailAndPassword($('email').value.trim(), $('password').value)
    .catch(e => $('loginMsg').textContent = 'Erro: '+e.code);
};

// ── CARREGAR + PREVIEW ──
let PENDING = []; // {newKey, nome, hora, val}
async function loadDate(){
  const date = $('dateInput').value;
  if(!date) return;
  const base = `painel/${date}`;
  $('summary').innerHTML = '<span class="muted">carregando…</span>';
  $('previewCard').classList.add('hide');
  PENDING = [];
  try{
    const [sheetSnap, premSnap, snapSnap] = await Promise.all([
      db.ref(`${base}/sheet`).once('value'),
      db.ref(`${base}/premiacao`).once('value'),
      db.ref(`snapshots/${date}`).once('value'),
    ]);
    const sheet = sheetSnap.val();
    const curRows = sheet && Array.isArray(sheet.rows) ? sheet.rows : [];
    const prem = premSnap.val() || {};
    const snap = snapSnap.val();
    const snapRows = snap && snap.rows ? (Array.isArray(snap.rows)?snap.rows:Object.values(snap.rows)) : [];

    const premSum = Object.values(prem).reduce((s,v)=>s+(+v||0),0);
    const snapPrem = snapRows.filter(r=>r&&r.premiacao!=null);
    const snapSum = snapPrem.reduce((s,r)=>s+(+r.premiacao||0),0);

    $('summary').innerHTML = `
      <div class="stats">
        <div class="stat"><div class="v">${curRows.length}</div><div class="l">torneios na grade atual</div></div>
        <div class="stat"><div class="v">${Object.keys(prem).length}</div><div class="l">no nó premiacao · R$ ${fmtBRL(premSum)}</div></div>
        <div class="stat"><div class="v">${snapPrem.length}</div><div class="l">no snapshot c/ premiação · R$ ${fmtBRL(snapSum)}</div></div>
      </div>`;

    if(!curRows.length){ log('⚠️ Nenhuma grade em '+base+'/sheet — verifique a data.'); return; }
    if(!snapPrem.length){ log('⚠️ Snapshot de '+date+' não tem premiações — nada a reatar por essa via.'); return; }

    // índice snapshot por nome+hora (ambíguos viram null)
    const byIdent = new Map();
    snapPrem.forEach(sr => { const id=norm(sr.nome,sr.hora); byIdent.set(id, byIdent.has(id)?null:sr.premiacao); });
    // contagem de identidade na grade atual (duplicado = ambíguo)
    const curCount = new Map();
    curRows.forEach(r => { const id=norm(r.nome,r.hora); curCount.set(id,(curCount.get(id)||0)+1); });

    let jaLigadas=0, ambiguas=0;
    curRows.forEach(r => {
      const nk = rowKey(r);
      if(prem[nk] != null){ jaLigadas++; return; }         // já tem premiação ligada
      const id = norm(r.nome, r.hora);
      if(curCount.get(id) !== 1){ ambiguas++; return; }     // duplicado na grade → não arrisca
      const val = byIdent.get(id);
      if(val == null) return;                               // sem match único no snapshot
      PENDING.push({ newKey:nk, nome:r.nome, hora:r.hora, val });
    });

    const pendSum = PENDING.reduce((s,p)=>s+p.val,0);
    $('previewCard').classList.remove('hide');
    $('previewHead').innerHTML = PENDING.length
      ? `<b>${PENDING.length} premiaç${PENDING.length>1?'ões':'ão'} a reatar</b> — total R$ ${fmtBRL(pendSum)}. ${jaLigadas} já ligadas${ambiguas?`, ${ambiguas} ambíguas (puladas)`:''}.`
      : `<span class="tag ok">Nada a reatar</span> — ${jaLigadas} já ligadas${ambiguas?`, ${ambiguas} ambíguas`:''}.`;

    const rowsHtml = PENDING.map(p => `<tr>
        <td>${escapeHtml(p.nome)}</td><td>${escapeHtml(p.hora||'')}</td>
        <td class="num">R$ ${fmtBRL(p.val)}</td>
        <td class="muted" style="font-size:12px">${p.newKey}</td>
      </tr>`).join('');
    $('previewTable').innerHTML = PENDING.length
      ? `<tr><th>Torneio</th><th>Hora</th><th>Premiação</th><th>Chave nova</th></tr>${rowsHtml}`
      : '';

    $('recoverBtn').disabled = PENDING.length === 0;
    $('recoverBtn').textContent = PENDING.length
      ? `Recuperar ${PENDING.length} · R$ ${fmtBRL(pendSum)}`
      : 'Nada a recuperar';
    $('recoverMsg').textContent = '';
    log(`Preview de ${date}: ${PENDING.length} a reatar, ${jaLigadas} já ligadas, ${ambiguas} ambíguas.`);
  }catch(e){
    $('summary').innerHTML = `<div class="banner err">Erro: ${e.message||e.code||e}</div>`;
    log('ERRO ao carregar: '+(e.message||e.code||e));
  }
}
function escapeHtml(s){ return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

$('loadBtn').onclick = loadDate;
$('dateInput').onchange = loadDate;

// ── GRAVAR ──
$('recoverBtn').onclick = async () => {
  if(!PENDING.length) return;
  const date = $('dateInput').value;
  const pendSum = PENDING.reduce((s,p)=>s+p.val,0);
  if(!confirm(`Gravar ${PENDING.length} premiações (R$ ${fmtBRL(pendSum)}) no nó painel/${date}/premiacao?\n\nIsso NÃO sobrescreve nada já preenchido — só reata as órfãs.`)) return;
  $('recoverBtn').disabled = true;
  $('recoverMsg').textContent = 'gravando…';
  try{
    const updates = {};
    PENDING.forEach(p => { updates[`painel/${date}/premiacao/${p.newKey}`] = p.val; });
    await db.ref().update(updates);
    log(`✓ ${PENDING.length} premiações gravadas (R$ ${fmtBRL(pendSum)}).`);
    $('recoverMsg').innerHTML = `<span class="tag ok">✓ ${PENDING.length} reatadas — R$ ${fmtBRL(pendSum)}</span> — recarregue o painel.`;
    setTimeout(loadDate, 800);
  }catch(e){
    log('ERRO ao gravar: '+(e.message||e.code||e));
    $('recoverMsg').innerHTML = `<span class="tag warn">Erro: ${e.message||e.code}</span>`;
    $('recoverBtn').disabled = false;
  }
};
</script>
</body>
</html>
